<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14243D"></stop>
      <stop offset="1" stop-color="#0C172A"></stop>
    </linearGradient>

    <linearGradient id="accent" x1="74" y1="60" x2="190" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7FF"></stop>
      <stop offset="1" stop-color="#3DB9F5"></stop>
    </linearGradient>

    <filter id="glow" x="0" y="0" width="256" height="256" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="8" y="8" width="240" height="240" rx="40" fill="url(#bg)"></rect>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="39.25" stroke="#243754" stroke-width="1.5"></rect>

  <!-- Soft glow -->
  <circle cx="128" cy="108" r="54" fill="#53D8FF" opacity="0.08" filter="url(#glow)"></circle>

  <!-- Abstract shield -->
  <path d="M128 52L176 70V110C176 144 153.5 171 128 184C102.5 171 80 144 80 110V70L128 52Z" fill="url(#accent)" fill-opacity="0.12" stroke="url(#accent)" stroke-width="4"></path>

  <!-- Lock body -->
  <rect x="96" y="108" width="64" height="52" rx="14" fill="#0F1C31" stroke="#6EE7FF" stroke-width="4"></rect>

  <!-- Lock shackle -->
  <path d="M108 108V94C108 82.954 116.954 74 128 74C139.046 74 148 82.954 148 94V108" stroke="#6EE7FF" stroke-width="4.5" stroke-linecap="round"></path>

  <!-- Keyhole -->
  <circle cx="128" cy="130" r="6.5" fill="#6EE7FF"></circle>
  <rect x="125.5" y="136" width="5" height="12" rx="2.5" fill="#6EE7FF"></rect>

  <!-- Corner tech lines -->
  <path d="M56 198H88" stroke="#3DB9F5" stroke-width="3" stroke-linecap="round" opacity="0.9"></path>
  <path d="M168 198H200" stroke="#3DB9F5" stroke-width="3" stroke-linecap="round" opacity="0.9"></path>
  <circle cx="50" cy="198" r="4" fill="#6EE7FF"></circle>
  <circle cx="206" cy="198" r="4" fill="#6EE7FF"></circle>

  <!-- Small confidential dots -->
  <circle cx="104" cy="206" r="3" fill="#6EE7FF" opacity="0.75"></circle>
  <circle cx="128" cy="206" r="3" fill="#6EE7FF" opacity="0.45"></circle>
  <circle cx="152" cy="206" r="3" fill="#6EE7FF" opacity="0.75"></circle>
</svg>
